# -- MongoDB configuration
mongodb:
  # -- To update this MongoDB container image configuration with appropriate fields
  image:
    # -- Image registry
    registry: docker.io
    # -- MongoDB image repository (official image)
    repository: mongo
    # -- MongoDB image tag
    tag: "8.2.3-noble"

  # -- MongoDB authentication settings
  auth:
    # -- Enable authentication
    enabled: true
    # -- Existing Kubernetes secret containing MongoDB credentials
    existingSecret: mongodb-auth

  # -- MongoDB persistent storage configuration
  persistence:
    # -- Enable persistence
    enabled: true
    # -- Size of the persistent volume
    size: 8Gi
    # -- Mount path inside the MongoDB container
    mountPath: /data/db

  # -- Extra environment variables injected into MongoDB container
  extraEnvVars:
    # -- MongoDB root username
    - name: MONGO_INITDB_ROOT_USERNAME
      valueFrom:
        secretKeyRef:
          name: mongodb-auth
          key: mongodb-root-username

    # -- MongoDB root password
    - name: MONGO_INITDB_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: mongodb-auth
          key: mongodb-root-password

    # -- Initial database to create
    - name: MONGO_INITDB_DATABASE
      value: "LibreChat"

# -- Extra volumes mounted into the LibreChat pod
volumes:
  # -- Remount logs to avoid EACCES permission issues
  - name: librechat-logs
    emptyDir: {}

  # -- Remount uploads to avoid EACCES permission issues
  - name: uploads
    emptyDir: {}

# -- Volume mounts for the LibreChat container
volumeMounts:
  # -- Mount path for LibreChat logs
  - name: librechat-logs
    mountPath: /app/logs

  # -- Mount path for LibreChat uploads
  - name: uploads
    mountPath: /app/uploads

# -- LibreChat application configuration
librechat:

  # -- Environment variables passed directly to LibreChat
  configEnv:
    # -- Allow new user registration
    ALLOW_REGISTRATION: "false"
    # -- Allow email/password login
    ALLOW_EMAIL_LOGIN: "false"
    # -- Allow social / OIDC login
    ALLOW_SOCIAL_LOGIN: "true"
    # -- Allow insecure TLS for OpenID (dev only, disable in production)
    OPENID_INSECURE: "true"
    # -- Disable TLS certificate verification (dev only, disable in production)
    NODE_TLS_REJECT_UNAUTHORIZED: "0"
    # -- Trust X-Forwarded-* headers when behind a reverse proxy
    TRUST_PROXY: "1"
    # -- OpenID Connect issuer URL (Keycloak realm endpoint)
    OPENID_ISSUER: "https://keycloak-ai-platforms-service-keycloak.apps-crc.testing/realms/chat-applications"
    # -- OpenID Connect client ID registered in Keycloak
    OPENID_CLIENT_ID: "librechat-ID"
    # -- OpenID Connect scopes requested during authentication
    OPENID_SCOPE: "openid profile email"
    # -- OpenID Connect callback path used by LibreChat
    OPENID_CALLBACK_URL: "/oauth/openid/callback"
    # -- Public server URL used by LibreChat (API & redirects)
    DOMAIN_SERVER: "https://librechat-librechat-librechat.apps-crc.testing"
    # -- Public client URL used by LibreChat (frontend origin)
    DOMAIN_CLIENT: "https://librechat-librechat-librechat.apps-crc.testing"

  # -- LibreChat YAML configuration file content
  configYamlContent:
    # -- LibreChat config schema version
    version: "1.3.1"

    # -- File routing configuration
    fileConfig:
      endpoints:
        default:
          disabled: true
        Qwen3-0.6B:
          disabled: true
        Qwen2.5-VL-3B:
          disabled: true

    # -- Endpoint definitions
    endpoints:
      custom:
        - name: "Qwen2.5-VL-3B"
          apiKey: "user_provided"
          baseURL: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:80/v1"
          headers:
            x-model: "qwen25-vl-instruct"
          models:
            default: ["qwen25-vl-instruct"]
            fetch: false
          titleConvo: true
          titleModel: "current_model"
          titleMessageRole: "user"
          summarize: false
          summaryModel: "current_model"
          forcePrompt: false

        - name: "Qwen3-0.6B"
          apiKey: "user_provided"
          baseURL: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:80/v1"
          headers:
            x-model: "qwen3-06b"
          models:
            default: ["qwen3-06b"]
            fetch: false
          titleConvo: true
          titleModel: "current_model"
          titleMessageRole: "user"
          summarize: false
          summaryModel: "current_model"
          forcePrompt: false


      # -- Agents endpoint: individual agents are created in the LibreChat UI
      # and persisted in MongoDB. This block sets defaults for new agents.
      # agents:
      #   capabilities: ["tools", "actions"]
      #   # Default model pre-selected when creating a new agent
      #   model: qwen3-4b
      #   # Which custom endpoint serves that model
      #   endpoint: Qwen3-4B
      #   # Let users create/edit agents in the UI
      #   disableBuilder: false
      #   # Max tool-call hops per turn
      #   recursionLimit: 50

    # -- MCP servers accessible through AgentGateway
    # mcpServers:
    #   agentgateway:
    #     type: streamable-http
    #     url: http://mcp-sse-keepalive-proxy.agentgateway-system.svc.cluster.local/mcp
    #     timeout: 60000

    # -- UI / interface feature toggles
    interface:
      endpointsMenu: true
      agents: false
      sidePanel: false
      fileSearch: false
      mcpServers:
        use: false
        share: false
        create: false
        public: false



# -- Ingress configuration
ingress:
  enabled: true
  annotations:
    route.openshift.io/termination: "edge"
  hosts:
    - host: librechat-librechat-librechat.apps-crc.testing
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# -- Meilisearch configuration
meilisearch:
  # -- Enable Meilisearch (disable if not used)
  enabled: false

  # -- Meilisearch persistence configuration
  persistence:
    enabled: false
